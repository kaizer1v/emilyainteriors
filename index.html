<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emily Interiors | Coming Soon</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'warm-white': '#FAF9F6',
            'cream': '#F5F0E8',
            'charcoal': '#2C2C2C',
            'warm-gray': '#6B6B6B',
            'sage': '#a6b8a7',
            'terracotta': '#C4A484'
          },
          fontFamily: {
            'serif': ['Cormorant Garamond', 'serif'],
            'sans': ['Inter', 'sans-serif']
          },
          letterSpacing: {
            'widest': '.15em'
          }
        }
      }
    }
  </script>

  <style>
    .fade-in {
      animation: fadeIn 1s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hover-lift {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .hover-lift:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    }

    .dropdown-menu {
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.3s ease;
    }

    .dropdown:hover .dropdown-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 1.5rem;
    }

    .testimonial-card {
      background: linear-gradient(135deg, #FAF9F6 0%, #F5F0E8 100%);
    }
  </style>
</head>

<body class="font-sans text-charcoal bg-warm-white antialiased">

  <!-- Coming Soon Section -->
  <section class="relative min-h-screen flex items-center justify-center overflow-hidden bg-cream">
    <div class="relative z-10 text-center text-charcoal px-4 max-w-4xl mx-auto fade-in">
      <!-- Logo -->
      <div class="mb-12">
        <img src="assets/logo.png" alt="Emily Interiors logo" class="h-32 md:h-40 w-auto mx-auto object-contain">

      <p class="text-sm md:text-base uppercase tracking-[0.3em] mb-6 opacity-70">Classic interiors, beautifully lived in</p>

        Coming Soon

      <p class="text-lg md:text-xl font-light mb-12 max-w-2xl mx-auto opacity-80 leading-relaxed">
        We’re crafting something beautiful. Our new website will showcase timeless spaces designed for real life.
      </p>

      <!-- Contact Info -->
      <div class="space-y-4 mb-12 max-w-lg mx-auto">
        <div class="flex items-center justify-center gap-3">
          <i data-lucide="mail" class="w-5 h-5 text-sage"></i>
          <a href="mailto:emily@emilyainteriors.com" class="hover:text-sage transition-colors text-sm md:text-base">
            emily@emilyainteriors.com
          </a>
        </div>
        <div class="flex items-center justify-center gap-3">
          <!-- <i data-lucide="phone" class="w-5 h-5 text-sage"></i> -->
          <!-- <a href="tel:+12125550147" class="hover:text-sage transition-colors text-sm md:text-base">
            (212) 555-0147
          </a> -->
        </div>
      </div>

      <!-- Social Links -->
      <div class="flex justify-center gap-6 mb-12">
        <a href="#" aria-label="Instagram" class="w-12 h-12 flex items-center justify-center border border-charcoal/20 hover:border-sage hover:bg-sage/10 transition-all">
          <img src="instagram.svg" alt="Instagram" class="w-5 h-5">
        </a>
        <a href="#" aria-label="Facebook" class="w-12 h-12 flex items-center justify-center border border-charcoal/20 hover:border-sage hover:bg-sage/10 transition-all">
          <img src="facebook.svg" alt="Facebook" class="w-5 h-5">
        </a>
      </div>

      <!-- Notify Form -->
      <!-- <div class="max-w-md mx-auto">
        <p class="text-sm uppercase tracking-widest mb-4 opacity-70">Get notified when we launch</p>
        <form onsubmit="handleNotifySubmit(event)" class="flex flex-col md:flex-row gap-3">
          <input
            type="email"
            required
            placeholder="Enter your email"
            class="flex-1 px-4 py-3 bg-white border border-charcoal/20 text-charcoal placeholder-warm-gray focus:border-sage focus:outline-none transition-colors"
          >
          <button

            class="px-6 py-3 bg-charcoal text-white hover:bg-sage transition-all duration-300 uppercase tracking-widest text-sm whitespace-nowrap"

            Notify Me
          </button>
        </form>
      </div> -->
    </div>

    <div class="absolute bottom-10 left-1/2 transform -translate-x-1/2 text-charcoal/60">
      <p class="text-xs uppercase tracking-wider">&copy; 2024 Emily Interiors</p>
    </div>
  </section>


  <!-- libraries -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- JavaScript -->
  <script>
    // Initialize Lucide icons
    lucide.createIcons()

    // Form submission for notify me
    function handleNotifySubmit(e) {
      e.preventDefault()
      const email = e.target.querySelector('input[type="email"]').value
      alert(`Thank you! We'll notify you at ${email} when we launch.`)
      e.target.reset()
    }
  </script>
</body>

</html>
